<div class="page">
    <h1>Menu Settings</h1>
    <p>
        This page is served by the <strong>settings</strong> module. It exists to
        demonstrate a second module and a nested menu entry that resolves to a real
        page.
    </p>
    <button hx-get="/api/settings/info" hx-target="#settings-info" hx-swap="innerHTML">
        Load settings info
    </button>
    <pre id="settings-info" class="page-output"></pre>
</div>
